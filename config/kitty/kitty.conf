# Kitty is the outer terminal UI layer.
# Keep it focused on fonts, tabs/windows, and a few memorable shortcuts.

font_family JetBrainsMono Nerd Font
font_size 14.0
bold_font auto
italic_font auto
bold_italic_font auto

enable_audio_bell no
visual_bell_duration 0.0
mouse_hide_wait 2.0
copy_on_select clipboard
strip_trailing_spaces smart
scrollback_lines 10000
remember_window_size yes
placement_strategy center
window_padding_width 8
window_border_width 3pt
draw_minimal_borders no
active_border_color #64d2ff
inactive_border_color #4b5563

shell_integration enabled
allow_remote_control yes
tab_bar_edge top
tab_bar_style separator
tab_separator "  |  "
active_tab_font_style bold

confirm_os_window_close 0
macos_option_as_alt left
macos_quit_when_last_window_closed yes

map kitty_mod+enter new_window_with_cwd
map kitty_mod+t new_tab_with_cwd
map kitty_mod+w close_window
map kitty_mod+[ previous_tab
map kitty_mod+] next_tab
map kitty_mod+d launch --location=vsplit --cwd=current
map kitty_mod+shift+d launch --location=hsplit --cwd=current
map kitty_mod+f toggle_layout stack
map kitty_mod+shift+f toggle_layout splits
map kitty_mod+equal change_font_size all +1.0
map kitty_mod+minus change_font_size all -1.0
map kitty_mod+backspace change_font_size all 0

# Function keys are reserved for actions that are easy to forget.
map f6 new_tab_with_cwd
map f7 launch --location=vsplit --cwd=current
map f8 kitten hints --type=path --program -
map f9 launch --cwd=current zsh -lc "tmux new-session -A -s main"
map f10 launch --cwd=current zsh -lc "dev"
