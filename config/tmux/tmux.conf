# Tmux owns persistent sessions and multi-repo work.
# Kitty owns the outer terminal window and tabs.

source-file ~/.config/tmux/themes/moonfly.tmux

set -g set-titles on
set -g set-titles-string "#{session_name}"

unbind C-b
set -g prefix C-a
bind C-a send-prefix

set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on
set -g history-limit 100000
set -g mouse on
set -g set-clipboard on
set -as terminal-features ",xterm-kitty:clipboard"
setw -g mode-keys vi

# Click in copy mode clears selection (does NOT exit copy mode)
bind -T copy-mode-vi MouseDown1Pane select-pane \; send-keys -X clear-selection
bind -T copy-mode    MouseDown1Pane select-pane \; send-keys -X clear-selection

# Drag to select → copies to clipboard on release via OSC 52
bind -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-pipe-no-clear
bind -T copy-mode    MouseDragEnd1Pane send-keys -X copy-pipe-no-clear

# Double/triple click to select word/line
bind -T copy-mode-vi DoubleClick1Pane select-pane \; send-keys -X select-word
bind -T copy-mode-vi TripleClick1Pane select-pane \; send-keys -X select-line

# v to start selection, y to yank (like vim)
bind -T copy-mode-vi v send-keys -X begin-selection
bind -T copy-mode-vi y send-keys -X copy-selection-and-cancel

# Escape exits copy mode (tmux default)
# q clears selection but stays in copy mode so you can keep reading
bind -T copy-mode-vi q send-keys -X clear-selection
set -g focus-events on
set -g escape-time 0
set -g repeat-time 300
set -g default-terminal "tmux-256color"
set -as terminal-features ",xterm-kitty:RGB"
set -g pane-border-lines heavy
set -g pane-border-style "fg=colour240"
set -g pane-active-border-style "fg=colour81"

set -g status off

bind r source-file ~/.config/tmux/tmux.conf \; display-message "tmux reloaded"
bind c new-window -c "#{pane_current_path}"
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
bind = select-layout even-horizontal
bind + select-layout even-vertical
bind z resize-pane -Z

bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

bind H resize-pane -L 5
bind J resize-pane -D 5
bind K resize-pane -U 5
bind L resize-pane -R 5

# Plugins (TPM)
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'

set -g @continuum-restore 'on'
set -g @continuum-boot 'on'
set -g @continuum-boot-options 'kitty'

run '~/.tmux/plugins/tpm/tpm'
