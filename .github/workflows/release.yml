name: Release

on:
  push:
    branches:
      - main

concurrency:
  group: ${{ github.ref }}-release

permissions:
  contents: write

jobs:
  release:
    runs-on: macos-15
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Compute next version
        id: version
        uses: flatherskevin/semver-action@v1
        with:
          incrementLevel: auto
          source: tags
          token: ${{ github.token }}

      - name: Create and push semver tag
        run: |
          version="${{ steps.version.outputs.nextVersion }}"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag "$version" "$GITHUB_SHA"
          git push origin "$version"

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ steps.version.outputs.nextVersion }}
          tag_name: ${{ steps.version.outputs.nextVersion }}
          generate_release_notes: true

      - name: Update moving major tag
        run: |
          version="${{ steps.version.outputs.nextVersion }}"
          major="${version#v}"
          major="${major%%.*}"
          moving_tag="v${major}"
          git tag -f "$moving_tag" "$version"
          git push origin "$moving_tag" --force
